<!DOCTYPE html>
<html>
<head>
  <title>Happy Birthday 🎉</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: linear-gradient(to right, #ff9a9e, #fad0c4);
      color: white;
      margin-top: 100px;
    }
    button {
      padding: 12px 25px;
      border: none;
      border-radius: 10px;
      background: white;
      color: #ff5e78;
      font-size: 18px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h1>Happy Birthday 🎂</h1>
  <p>Wishing you lots of happiness 😊</p>

  <button onclick="showMessage()">Click Me 🎁</button>

  <p id="message" style="display:none; margin-top:20px;">
    🎉 You are really special! Stay happy always 😊
  </p>

  <script>
    function showMessage() {
      document.getElementById("message").style.display = "block";
    }
  </script>

</body>
</html>
